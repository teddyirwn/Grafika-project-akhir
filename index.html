<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arena Clash - Project Akhir</title>
  </head>
  <body>
    <div id="start-scene">
      <div class="start-card">
        <div class="logo-icon">⚔️</div>
        <h1>Arena Clash</h1>
        <p>2 Player Battle Game</p>

        <div class="input-group">
          <div class="field">
            <label for="p1-name-input">Player 1 Name</label>
            <input
              type="text"
              id="p1-name-input"
              placeholder="Samurai Name...."
              maxlength="12"
            />
          </div>

          <div class="vs-divider"><span>VS</span></div>

          <div class="field">
            <label for="p2-name-input">Player 2 Name</label>
            <input
              type="text"
              id="p2-name-input"
              placeholder="Shinobi Name...."
              maxlength="12"
            />
          </div>
        </div>

        <button id="start-btn">START GAME</button>
        <p class="footer-text">Get your fingers ready for battle!</p>
      </div>
    </div>

    <div id="battle-scene" style="display: none">
      <div class="container">
        <div id="health-container">
          <div class="health-bar-wrapper">
            <div id="player1-health" class="health-bar-fill"></div>
          </div>

          <div class="health-bar-wrapper">
            <div id="player2-health" class="health-bar-fill"></div>
          </div>
        </div>

        <div id="game-over-screen">
          <h1 id="winner-text">PLAYER 1 WINS!</h1>
          <button id="restart-btn">PLAY AGAIN</button>
        </div>

        <div class="player">
          <div class="info-header">
            <div class="foto"></div>
            <div class="info">
              <h4 id="display-p1-name">Player 1</h4>
              <p>Samurai</p>
            </div>
          </div>
          <p>Keyboard Controls:</p>
          <hr />
          <div class="info-card">
            <h4>Jump</h4>
            <span>W</span>
          </div>
          <div class="info-card">
            <h4>Left</h4>
            <span>A</span>
          </div>
          <div class="info-card">
            <h4>Right</h4>
            <span>D</span>
          </div>
          <div class="info-card">
            <h4>Attack</h4>
            <span>C</span>
          </div>
        </div>

        <div class="arena-Container">
          <h1>Arena Battle</h1>
          <canvas id="arena"></canvas>
        </div>

        <div class="player">
          <div class="info-header">
            <div class="foto"></div>
            <div class="info">
              <h4 id="display-p2-name">Player 2</h4>
              <p>Shinobi</p>
            </div>
          </div>
          <p>Keyboard Controls:</p>
          <hr />
          <div class="info-card">
            <h4>Jump</h4>
            <span>I</span>
          </div>
          <div class="info-card">
            <h4>Left</h4>
            <span>J</span>
          </div>
          <div class="info-card">
            <h4>Right</h4>
            <span>L</span>
          </div>
          <div class="info-card">
            <h4>Attack</h4>
            <span>N</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/script/main.js"></script>
  </body>
</html>
